name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3 python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libssl-dev libjpeg-dev zlib1g-dev libffi8 liblzma-dev uuid-dev openjdk-17-jdk

      - name: Setup Python and Buildozer
        run: |
          pip3 install --user --upgrade buildozer cython==0.29.36 virtualenv

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # 3 baar retry logic taaki 404 error na aaye
          for i in {1..3}; do
            yes | buildozer android debug && break || sleep 20
          done
          
          # APK Discovery: APK dhoond kar bahar lana
          find . -name "*.apk" -exec cp {} ./brahmastra_final.apk \;
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Brahmastra-Final-App
          path: brahmastra_final.apk
